{% extends "base.html" %}
{% block title %}Access denied — R.P.N{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center rpn-bg-sand p-3">
  <div class="card rpn-login-card shadow-sm text-center">
    <div class="card-body p-4 p-md-5">
      <div class="rpn-icon-circle rpn-icon-danger mx-auto mb-3">!</div>
      <h1 class="h4 fw-medium mb-2" style="color:#C0522A;">Access denied</h1>
      <p class="text-muted small mb-3">
        Your email is not registered with R.P.N,
        or your membership has been deactivated.
      </p>
      <p class="small fw-medium mb-4" style="color:#B5622A;">
        Please contact your group administrator.
      </p>
      <a href="{{ url_for('auth.login') }}" class="btn rpn-btn-outline-primary btn-sm">
        &larr; Back to login
      </a>
    </div>
  </div>
</div>
{% endblock %}
